<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE EXILE'S DAILY TRACKER — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f1a; --bg2: #111428; --bg3: #161a2e;
    --border: #1e2540; --border2: #2a3160;
    --gold: #f0b429; --gold2: #ffd166;
    --cyan: #06b6d4; --cyan2: #67e8f9;
    --red: #ef4444; --green: #22c55e;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-title {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold2);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  .logo-line {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 12px auto;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    width: 100%;
    max-width: 400px;
    padding: 32px;
  }

  .card-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--cyan);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border2);
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--cyan); }
  .form-input::placeholder { color: var(--text3); }

  .btn-primary {
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover { background: var(--gold); color: var(--bg); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-top: 10px;
  }

  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }

  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
  .divider span { font-size: 11px; color: var(--text3); letter-spacing: 2px; }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }

  .success-msg {
    background: rgba(34,197,94,0.1);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }

  .toggle-link {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text3);
  }

  .toggle-link a {
    color: var(--cyan);
    cursor: pointer;
    text-decoration: none;
  }

  .toggle-link a:hover { color: var(--cyan2); }

  .loading { opacity: 0.6; pointer-events: none; }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-title">The Exile's Daily Tracker</div>
  <div class="logo-line"></div>
  <div class="logo-sub">v1.0 — forge your discipline</div>
</div>

<div class="card">
  <div class="card-title" id="card-title">⚔ Access Terminal</div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="login-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="handleLogin()">Enter ⚡</button>
    <div class="divider"><span>or</span></div>
    <button class="btn-secondary" onclick="showRegister()">Create Account</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form" style="display:none">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="reg-username" placeholder="exile_name">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="reg-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="reg-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="handleRegister()">Begin The Journey ⚡</button>
    <div class="divider"><span>or</span></div>
    <button class="btn-secondary" onclick="showLogin()">Back to Login</button>
  </div>

  <div class="toggle-link" id="toggle-link">
    No account? <a onclick="showRegister()">Create one</a>
  </div>
</div>

<script>
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  function clearMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showRegister() {
    clearMessages();
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
    document.getElementById('card-title').textContent = '⚔ New Exile Registration';
    document.getElementById('toggle-link').innerHTML = 'Already have an account? <a onclick="showLogin()">Login</a>';
  }

  function showLogin() {
    clearMessages();
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('card-title').textContent = '⚔ Access Terminal';
    document.getElementById('toggle-link').innerHTML = 'No account? <a onclick="showRegister()">Create one</a>';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) { showError('All fields required.'); return; }

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        showSuccess('Access granted. Redirecting...');
        setTimeout(() => window.location.href = '/tracker.html', 800);
      } else if (res.status === 404) {
        showError('Invalid email or password.');
      } else {
        showError('Something went wrong. Try again.');
      }
    } catch (e) {
      showError('Cannot connect to server.');
    }
  }

  async function handleRegister() {
    const userName = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!userName || !email || !password) { showError('All fields required.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userName, email, password })
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        showSuccess('Account created. Redirecting...');
        setTimeout(() => window.location.href = '/tracker.html', 800);
      } else if (res.status === 500) {
        showError('Email or username already exists.');
      } else {
        showError('Registration failed. Try again.');
      }
    } catch (e) {
      showError('Cannot connect to server.');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('register-form').style.display !== 'none') handleRegister();
      else handleLogin();
    }
  });

  if (localStorage.getItem('token')) {
    window.location.href = '/tracker.html';
  }
</script>
</body>
</html>
